{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{%block title%}Medi-Share | Share Medicine, Share Hope{%endblock%}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>

     <!-- navbar -->
    <header class="border-bottom bg-white sticky-top">
        <nav class="navbar navbar-expand-lg container py-3">
            <a class="navbar-brand">
                <img src="{% static 'images/logo.png' %}" alt="Medi-Share Logo" width="30" height="30" class="d-inline-block align-text-top">
                Medi-Share
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-lg-2" >
                    <li class="nav-item">Home</li>
                    <li class="nav-item">How It Works</li>
                    <li class="nav-item">Find Medicine</li>
                    <li class="nav-item">Donate Medicine</li>
                    <li class="nav-item">About Us</li>
                    <li class="nav-item">Contact</li>
                </ul>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-success">Login</button>
                    <button class="btn btn-success">Sign Up</button>
                </div>
            </div>
        </nav>
    </header>


    {% block content %}{% endblock %}
     <!-- footer -->

    
</body>
</html>
